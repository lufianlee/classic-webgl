services:
  backend:
    build:
      context: ./backend
    container_name: classic-webgl-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - backend_cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - CACHE_DIR=/app/cache
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # LLM commentary — at least one of these should be set. Unset
      # variables are passed through as empty; the backend handles that.
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: classic-webgl-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.mjs:/app/next.config.mjs
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_cache:
